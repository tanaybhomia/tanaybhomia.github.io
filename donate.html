<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - Tanay Bhomia</title>
    <link rel="icon" href="/assets/pfp2.png?v=2" type="image/png">
    <link rel="apple-touch-icon" href="/assets/pfp2.png?v=2">
    <meta property="og:title" content="Donate - Tanay Bhomia">
    <meta property="og:description" content="Support my ongoing development projects.">
    <meta property="og:image" content="/assets/pfp2.png?v=2">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/adwaita-sans@5.0.18/index.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
            <span id="theme-icon"></span>
        </button>
        <header class="profile">
            <a href="/" class="back-link">← Back</a>
            <div class="avatar-container" style="margin-top: 16px;">
                <img src="/assets/pfp2.png" alt="Tanay Bhomia" class="avatar">
            </div>
            <h1>Support My Work</h1>
            <p class="bio">
                If you find my projects helpful and want to support their ongoing development, you can do so through the platforms below. Thank you!
            </p>
        </header>

        <section class="projects">
            <div class="projects-grid">
                <div class="project-card">
                    <a href="https://github.com/sponsors/tanaybhomia" target="_blank" class="card-main-link"></a>
                    <div class="project-icon" style="background-color: transparent; border: 1px solid var(--card-border);">
                        <img src="/assets/icons/githubicon.png" alt="GitHub Sponsors" style="width: 48px; height: 48px; object-fit: contain; filter: invert(0);">
                    </div>
                    <h3>GitHub Sponsors</h3>
                    <p>Support me directly on GitHub</p>
                </div>

                <div class="project-card">
                    <a href="https://ko-fi.com/tanaybhomia" target="_blank" class="card-main-link"></a>
                    <div class="project-icon" style="background-color: #ff5e5b;">
                        <span style="font-size: 48px; line-height: 1;">☕</span>
                    </div>
                    <h3>Ko-fi</h3>
                    <p>Buy me a coffee on Ko-fi</p>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
